name: Scrape worker

on:
  schedule:
    # a cada 15 minutos — consome extrações queued
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      fonte_slug:
        description: "Slug da fonte a processar (vazio = todas queued)"
        required: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scrapers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scrapers/package.json

      - name: Install deps
        run: npm install --omit=dev

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node worker.mjs ${{ github.event.inputs.fonte_slug }}
